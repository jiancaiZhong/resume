      - 基于Seata AT模式解决跨服务分布式事务，保证订单、库存、账务数据最终一致性
      - 使用ES实现商品全文检索、多条件筛选，优化搜索接口响应速度
      - 参与Docker镜像打包、服务器部署、Nginx负载均衡配置，支撑大促高并发场景
