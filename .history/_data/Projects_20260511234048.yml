  - title: "影像管理平台 ([# 内网项目](#))"
    description: 
      - 参与影像管理中台核心模块设计与开发，作为集团公共中台系统，统一各子公司影像文件增删改查归口管理，定义标准化接口规范与数据库模型
      - 集成华为云OBS对象存储，实现影像文件云端持久化存储、分层归档与在线预览访问
      - 支撑高并发影像批量上传、分片上传机制，基于Redis实现接口限流、重复上传拦截与临时文件缓存，保障高并发场景系统稳定
      - 基于RabbitMQ实现影像异步转码、文件归档、业务消息解耦，削峰填谷减轻前端上传压力，提升整体系统吞吐量
      - 采用Elasticsearch构建影像全文检索能力，支持文件名、标签、业务类型、上传时间多条件组合检索，大幅优化查询响应速度
