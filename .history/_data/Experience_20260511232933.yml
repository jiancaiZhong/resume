subject: 工作经验
listing-order: 3
icon: "/assets/img/briefcase.svg"
contents:
  - title: 中国人保<span style="color:#999;">信雅达与云南南天驻场中国人保</span>
    role: JAVA 研发工程师
    description:
      - 负责影像管理中台微服务后端接口开发，完成影像文件业务需求迭代、功能开发与线上日常维护
      - 整合华为云 OBS 对象存储，实现影像文件上传、存储、预览、下载及归档全流程业务能力
      - 参与国产信创改造适配，以及实现百亿级数据从 postgreSQL 到 HGDB 数据量的迁移工作
      - 运用 Redis 实现并发上传限流、防重提交及热点影像数据缓存，有效提升接口响应速度与系统并发能力
      - 基于 rocketMQ 实现异步消息解耦，处理影像文件后台转码、归档等异步任务，削峰填谷提升系统吞吐量
      - 基于Elasticsearch实现影像文件全文检索、多条件组合筛选，优化检索查询体验与查询效率
      - 参与 Consul 服务注册配置、Zuul 网关路由及权限拦截配置，参与项目测试、测试环境流水线搭建，使用 Git 进行代码版本管控与团队分支协作
      - 参与基于vue3的影像页面开发，包括 CRUD、OCR识别、智能分类功能的迭代和维护
    date: 2024.05 - 至今
  - title: Amazone
    role: Senior Software Engineer
    description: 
      - Built a Java microservice, database schema to manage customer accounts
      - Enhanced internal pipelines to query real-time data from client devices
    date: Apr. 2016 - Dec. 2018
  - title: Pacebook
    role: Software Engineer Intern
    description: 
      - Designed the dynamic website using React for data visualization
      - Integrated '*Yolo*' to boost the accuracy of the object detection
    date: Jul. 2013 - Sep. 2013